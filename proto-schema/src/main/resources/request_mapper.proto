syntax = "proto3";

import "common.proto";
import "google/protobuf/timestamp.proto";

message ResourceMappingRequest {
  int64 mappingRequestId = 1;
  Coordinates patientCoordinates = 2;
}

message ResourceMappingResponse {
  int64 mappingRequestId = 1;
  google.protobuf.Timestamp arrivalTime = 2;
}